<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claw-a-thon Travel — Hannah AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    body { background: #F0F4F8; font-family: 'Segoe UI', system-ui, sans-serif; }

    .chat-bubble-ai {
      background: white;
      border-radius: 0 16px 16px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .chat-bubble-user {
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      border-radius: 16px 0 16px 16px;
      color: white;
    }

    .typing-dot {
      width: 8px; height: 8px;
      background: #9CA3AF;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .result-card {
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      background: white;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .result-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); transform: translateY(-1px); }

    .chip-card {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .chip-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }

    .panel-slide {
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
    }

    .payment-btn {
      border: 2px solid #E5E7EB;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.15s;
      background: white;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }
    .payment-btn:hover { border-color: #6366F1; color: #6366F1; }
    .payment-btn.selected { border-color: #6366F1; background: #EEF2FF; color: #4F46E5; }

    .confirm-btn {
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: white;
      border-radius: 12px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      border: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .confirm-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Airline color accents */
    .accent-VN { background: #1E40AF; }
    .accent-VJ { background: #DC2626; }
    .accent-QH { background: #059669; }
    .accent-BL { background: #7C3AED; }
    .accent-default { background: #6366F1; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden" x-data="chatApp()" x-cloak>

  <!-- Header -->
  <header class="flex items-center gap-3 px-5 py-3 bg-white shadow-sm z-10 flex-shrink-0">
    <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-lg">✈</div>
    <div>
      <h1 class="font-bold text-gray-900 text-base leading-tight">Claw-a-thon Travel</h1>
      <p class="text-xs text-emerald-500 font-medium">● Hannah đang trực tuyến</p>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <button @click="resetChat()" class="text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg px-3 py-1.5 transition-colors">
        Cuộc trò chuyện mới
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <div class="flex-1 relative overflow-hidden">

    <!-- ── CHAT PANEL ─────────────────────────────────────────────────────── -->
    <div
      class="absolute inset-0 flex flex-col panel-slide"
      :class="panel === 'chat' ? 'translate-x-0 opacity-100' : '-translate-x-full opacity-0 pointer-events-none'"
    >
      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto scrollbar-hide px-4 py-4 space-y-4">

        <template x-for="(msg, i) in messages" :key="i">
          <div>
            <!-- AI message -->
            <div x-show="msg.role === 'assistant'" class="flex items-start gap-2 max-w-[85%]">
              <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm flex-shrink-0 mt-0.5">C</div>
              <div class="flex-1 space-y-3">
                <div x-show="msg.text" class="chat-bubble-ai px-4 py-3 text-gray-800 text-sm leading-relaxed" x-html="formatText(msg.text)"></div>
                <!-- Suggestion chips -->
                <template x-if="msg.structured && msg.structured.type === 'suggestions'">
                  <div>
                    <p class="text-xs text-gray-500 mb-2 px-1" x-text="msg.structured.message"></p>
                    <div class="grid grid-cols-3 gap-2">
                      <template x-for="chip in msg.structured.chips" :key="chip.value">
                        <div class="chip-card" @click="sendChip(chip.value)">
                          <img :src="'/images/' + chip.image_key + '.svg'" :alt="chip.label"
                               class="w-full h-20 object-cover" onerror="this.style.background='#E0E7FF';this.src=''" />
                          <div class="p-2">
                            <p class="font-semibold text-gray-900 text-xs truncate" x-text="chip.label"></p>
                            <p class="text-gray-400 text-xs" x-text="chip.subtitle"></p>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                <!-- Result cards -->
                <template x-if="msg.structured && msg.structured.type === 'results'">
                  <div class="space-y-3">
                    <template x-for="opt in msg.structured.options" :key="opt.sku_id">
                      <div class="result-card overflow-hidden">
                        <div class="flex">
                          <div class="w-1.5 flex-shrink-0 rounded-l-xl" :class="getAccentClass(opt.title)"></div>
                          <div class="flex-1 p-3">
                            <div class="flex items-start justify-between gap-2">
                              <div class="flex-1 min-w-0">
                                <p class="font-semibold text-gray-900 text-sm truncate" x-text="opt.title"></p>
                                <p class="text-xs text-gray-500 mt-0.5" x-text="opt.subtitle"></p>
                              </div>
                              <div class="text-right flex-shrink-0">
                                <p class="font-bold text-indigo-600 text-sm" x-text="formatPrice(opt.price)"></p>
                                <p class="text-xs text-gray-400" x-text="opt.currency || 'VND'"></p>
                              </div>
                            </div>
                            <div class="flex flex-wrap gap-1 mt-2">
                              <template x-for="h in (opt.highlights || []).slice(0,3)" :key="h">
                                <span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full" x-text="h"></span>
                              </template>
                            </div>
                            <button
                              @click="selectOption(opt)"
                              class="mt-2 w-full text-center text-xs font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-lg py-2 transition-colors">
                              Chọn →
                            </button>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>

            <!-- User message -->
            <div x-show="msg.role === 'user'" class="flex justify-end">
              <div class="chat-bubble-user px-4 py-3 text-sm max-w-[75%] leading-relaxed" x-text="msg.text"></div>
            </div>
          </div>
        </template>

        <!-- Typing indicator -->
        <div x-show="loading" class="flex items-start gap-2">
          <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm flex-shrink-0">C</div>
          <div class="chat-bubble-ai px-4 py-3 flex gap-1 items-center">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>

      <!-- Input bar -->
      <div class="flex-shrink-0 px-4 py-3 bg-white border-t border-gray-100">
        <div class="flex gap-2 items-end">
          <textarea
            x-model="input"
            @keydown.enter.prevent="if(!$event.shiftKey && input.trim()) sendMessage()"
            placeholder="Nhập tin nhắn..."
            rows="1"
            :disabled="loading"
            class="flex-1 resize-none border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition disabled:opacity-50"
            style="max-height:120px"
          ></textarea>
          <button
            @click="sendMessage()"
            :disabled="loading || !input.trim()"
            class="flex-shrink-0 w-11 h-11 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white flex items-center justify-center transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ── CHECKOUT PANEL ──────────────────────────────────────────────────── -->
    <div
      class="absolute inset-0 flex flex-col bg-gray-50 panel-slide overflow-y-auto scrollbar-hide"
      :class="panel === 'checkout' ? 'translate-x-0 opacity-100' : 'translate-x-full opacity-0 pointer-events-none'"
    >
      <!-- Checkout header -->
      <div class="flex items-center gap-3 px-5 py-4 bg-white border-b border-gray-100 flex-shrink-0">
        <button @click="panel='chat'" class="text-gray-500 hover:text-gray-700 p-1 -ml-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2 class="font-bold text-gray-900">Xác nhận đặt chỗ</h2>
      </div>

      <div class="flex-1 px-4 py-4 space-y-4 max-w-lg mx-auto w-full">
        <!-- Booking summary -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center text-xl flex-shrink-0" x-text="getVerticalIcon(handoff)">✈️</div>
            <div class="flex-1 min-w-0">
              <p class="font-bold text-gray-900 text-base leading-snug" x-text="handoff.summary"></p>
              <p class="text-sm text-gray-500 mt-0.5">Mã SKU: <span class="font-mono text-gray-700" x-text="handoff.sku_id"></span></p>
            </div>
          </div>
          <div class="mt-3 pt-3 border-t border-gray-100 flex justify-between items-center">
            <span class="text-gray-500 text-sm">Tổng thanh toán</span>
            <span class="font-bold text-indigo-600 text-lg" x-text="formatPrice(handoff.total_price) + ' VND'"></span>
          </div>
        </div>

        <!-- Passenger form -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <h3 class="font-semibold text-gray-900 mb-3">Thông tin liên hệ</h3>
          <div class="space-y-3">
            <div>
              <label class="text-xs text-gray-500 font-medium">Họ và tên *</label>
              <input x-model="passenger.name" type="text" placeholder="Nguyễn Văn A"
                class="w-full mt-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition"
                :class="errors.name ? 'border-red-400' : ''" />
              <p x-show="errors.name" class="text-xs text-red-500 mt-1" x-text="errors.name"></p>
            </div>
            <div>
              <label class="text-xs text-gray-500 font-medium">Email *</label>
              <input x-model="passenger.email" type="email" placeholder="email@example.com"
                class="w-full mt-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition"
                :class="errors.email ? 'border-red-400' : ''" />
              <p x-show="errors.email" class="text-xs text-red-500 mt-1" x-text="errors.email"></p>
            </div>
            <div>
              <label class="text-xs text-gray-500 font-medium">Số điện thoại *</label>
              <input x-model="passenger.phone" type="tel" placeholder="0901 234 567"
                class="w-full mt-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition"
                :class="errors.phone ? 'border-red-400' : ''" />
              <p x-show="errors.phone" class="text-xs text-red-500 mt-1" x-text="errors.phone"></p>
            </div>
          </div>
        </div>

        <!-- Payment methods -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <h3 class="font-semibold text-gray-900 mb-3">Phương thức thanh toán</h3>
          <div class="grid grid-cols-2 gap-2">
            <template x-for="method in paymentMethods" :key="method.id">
              <button
                @click="selectedPayment = method.id"
                class="payment-btn flex items-center gap-2"
                :class="selectedPayment === method.id ? 'selected' : ''">
                <span x-text="method.icon"></span>
                <span x-text="method.label"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- Confirm button -->
        <button
          @click="confirmBooking()"
          :disabled="bookingLoading"
          class="confirm-btn">
          <span x-show="!bookingLoading" x-text="'XÁC NHẬN ĐẶT CHỖ — ' + formatPrice(handoff.total_price) + ' VND'"></span>
          <span x-show="bookingLoading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Đang xử lý...
          </span>
        </button>
        <div class="pb-6"></div>
      </div>
    </div>

    <!-- ── CONFIRMED PANEL ─────────────────────────────────────────────────── -->
    <div
      class="absolute inset-0 flex flex-col items-center justify-center bg-white px-6 panel-slide"
      :class="panel === 'confirmed' ? 'translate-x-0 opacity-100' : 'translate-x-full opacity-0 pointer-events-none'"
    >
      <div class="w-20 h-20 rounded-full bg-emerald-100 flex items-center justify-center mb-6">
        <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 text-center">Đặt chỗ thành công!</h2>
      <p class="text-gray-500 text-center mt-2 text-sm">Cảm ơn bạn đã tin tưởng Claw-a-thon Travel</p>

      <div class="mt-6 w-full max-w-sm bg-gray-50 rounded-2xl p-4 text-center">
        <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Mã đặt chỗ</p>
        <p class="text-3xl font-mono font-bold text-indigo-600 tracking-widest" x-text="bookingRef"></p>
      </div>

      <div class="mt-4 w-full max-w-sm bg-white border border-gray-100 rounded-2xl p-4">
        <p class="text-sm text-gray-700 text-center font-medium" x-text="confirmedSummary"></p>
        <p class="text-center text-indigo-600 font-bold mt-1" x-text="confirmedPrice"></p>
      </div>

      <p class="text-xs text-gray-400 text-center mt-4">
        Chi tiết đặt chỗ đã được lưu trong phiên của bạn.
      </p>

      <div class="flex gap-3 mt-6 w-full max-w-sm">
        <button @click="resetChat()"
          class="flex-1 border-2 border-indigo-200 text-indigo-600 font-semibold rounded-xl py-3 text-sm hover:bg-indigo-50 transition-colors">
          Đặt chuyến khác
        </button>
        <button @click="viewOrder()"
          class="flex-1 bg-indigo-600 text-white font-semibold rounded-xl py-3 text-sm hover:bg-indigo-700 transition-colors">
          Xem đơn hàng
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div
    x-show="toast"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-end="opacity-0"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-5 py-3 rounded-xl shadow-lg z-50 max-w-xs text-center"
    x-text="toast"
  ></div>

  <script src="/app.js"></script>
</body>
</html>
